<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI 项目雷达 · 2026-07-16</title><style>
:root{--bg:#0b1020;--card:#131b34;--line:#2a3960;--text:#f2f5ff;--muted:#a7b5d8;--a:#7c9cff;--b:#4ee1bb}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% 10%,#182958,transparent 32%),var(--bg);color:var(--text);font:16px system-ui,-apple-system,"Microsoft YaHei",sans-serif}main{max-width:1120px;margin:auto;padding:44px 22px 64px}.eyebrow{color:var(--b);letter-spacing:.12em;font-weight:700}h1{font-size:clamp(34px,6vw,62px);margin:10px 0}header p{color:var(--muted);max-width:700px}.grid{display:grid;grid-template-columns:1.05fr .95fr;gap:22px;margin-top:28px}.panel{background:#111a31d9;border:1px solid var(--line);border-radius:20px;padding:22px}canvas{width:100%;height:auto;display:block}#buttons{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px}button{color:var(--text);background:#1b2747;border:1px solid #3a4b78;border-radius:999px;padding:9px 13px;cursor:pointer}button.active{background:var(--a);border-color:var(--a);color:#081024;font-weight:800}.score{font-size:42px;font-weight:800;color:var(--b)}.pill{display:inline-block;background:#20335a;color:#bdd0ff;padding:5px 9px;border-radius:99px;font-size:13px;margin-left:8px}.meta{color:var(--muted);margin:7px 0 18px}.axes{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:20px 0}.axis{background:#192443;border-radius:10px;padding:8px;text-align:center;font-size:12px}.axis b{display:block;color:var(--b);font-size:18px}h2{margin:0 0 8px}h3{font-size:14px;color:#aebee4;margin:18px 0 8px;text-transform:uppercase;letter-spacing:.07em}li{margin:7px 0;color:#dbe3fa}a{color:#8eabff}.watch{margin-top:22px}.watch article{border-top:1px solid var(--line);padding:13px 0;display:flex;justify-content:space-between;gap:14px}.watch small{color:var(--muted)}footer{color:var(--muted);font-size:13px;margin-top:25px}@media(max-width:760px){.grid{grid-template-columns:1fr}.axes{grid-template-columns:repeat(5,1fr)}}
</style></head><body><main><header><div class="eyebrow">DAILY AI CONTENT RADAR · 2026-07-16</div><h1>AI 项目雷达</h1><p>今天的信号集中于三类工程化 agent：安全验证、端到端工作流，以及多 agent 控制面。所有重点项目均已核验 README 与上手路径。</p></header><section class="grid"><div class="panel"><h2>五维雷达</h2><canvas id="radar" width="620" height="520" aria-label="项目雷达图"></canvas><div id="buttons" aria-label="选择项目"></div></div><article class="panel"><div><span class="score" id="score"></span><span class="pill" id="tag"></span></div><div class="meta" id="status"></div><h2 id="name"></h2><p id="summary"></p><div class="axes" id="axes"></div><h3>项目亮点</h3><ul id="highlights"></ul><h3>最适合谁</h3><p id="best"></p><h3>入选原因</h3><p id="reason"></p><a id="link" target="_blank" rel="noopener">查看原始项目 →</a></article></section><section class="panel watch"><h2>项目清单 / Watchlist</h2><div id="list"></div></section><footer>评分权重：可用性 25%、热度 20%、增速 20%、新颖性 20%、活跃度 15%。信任状态独立于雷达轴；重点项目仅收录 High / Medium 置信度条目。</footer></main><script>
const projects=[{"name":"Strix","score":83,"status":"High · README verified","tag":"High Momentum","url":"https://github.com/usestrix/strix","axes":[78,84,86,88,76],"summary":"开源 AI 渗透测试代理：动态运行目标、验证 PoC，并生成修复建议与报告。","highlights":["多代理协作执行侦察、利用与验证","CLI 与 GitHub Actions 工作流可直接试用","强调真实 PoC，减少传统扫描器的误报"],"best":"应用安全、DevSecOps 与已获授权的测试团队","reason":"安全自动化从“静态发现”向“可验证、可修复”的 agent 工作流演进。"},{"name":"Sim","score":80,"status":"High · README verified","tag":"Useful Tool","url":"https://github.com/simstudioai/sim","axes":[76,77,88,76,78],"summary":"用于构建、部署和管理 AI agents/workflows 的开源工作区，覆盖集成、知识、表格、调度与运行监控。","highlights":["支持可视化、对话与代码三种构建方式","连接 1,000+ 集成及主流 LLM","提供 npx 与 Docker 自托管上手路径"],"best":"需要把 SaaS、数据与 agent 自动化连接起来的产品及运营团队","reason":"可运行的 agent 产品开始把“流程、数据、观测”收敛到同一个工作台。"},{"name":"OpenHands Agent Canvas","score":81,"status":"High · README verified","tag":"Trend Representative","url":"https://github.com/OpenHands/OpenHands","axes":[82,75,83,80,81],"summary":"面向本地、远程和云端 coding agents 的自托管开发者控制中心，可将日常工程工作编排为自动化。","highlights":["可切换 OpenHands、Claude Code、Codex、Gemini 与 ACP agents","支持本地、Docker、VM 等运行后端","把工程任务、Webhook 与定时自动化组合为长期运行服务"],"best":"管理多种编码 agent、重视自托管和持续自动化的工程团队","reason":"多 agent 控制面正在成为工程团队管理“长期运行 AI 同事”的基础设施。"}],labels=["热度","增速","可用","新颖","活跃"];let selected=0;
function draw(p){const c=document.querySelector("#radar"),x=c.getContext("2d"),cx=310,cy=260,R=180,n=5;x.clearRect(0,0,c.width,c.height);for(let r=1;r<=5;r++){x.beginPath();for(let i=0;i<n;i++){let a=-Math.PI/2+i*2*Math.PI/n,rr=R*r/5;x.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr)}x.closePath();x.strokeStyle="#33456f";x.stroke()}labels.forEach((l,i)=>{let a=-Math.PI/2+i*2*Math.PI/n;x.beginPath();x.moveTo(cx,cy);x.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);x.strokeStyle="#33456f";x.stroke();x.fillStyle="#c9d6f5";x.font="15px system-ui";x.textAlign="center";x.fillText(l,cx+Math.cos(a)*(R+32),cy+Math.sin(a)*(R+32))});x.beginPath();p.axes.forEach((v,i)=>{let a=-Math.PI/2+i*2*Math.PI/n,rr=R*v/100,px=cx+Math.cos(a)*rr,py=cy+Math.sin(a)*rr;i?x.lineTo(px,py):x.moveTo(px,py)});x.closePath();x.fillStyle="#4ee1bb55";x.fill();x.strokeStyle="#4ee1bb";x.lineWidth=3;x.stroke()}
function render(){const p=projects[selected];draw(p);document.querySelector("#score").textContent=p.score;document.querySelector("#tag").textContent=p.tag;document.querySelector("#status").textContent=p.status;document.querySelector("#name").textContent=p.name;document.querySelector("#summary").textContent=p.summary;document.querySelector("#highlights").innerHTML=p.highlights.map(v=>"<li>"+v+"</li>").join("");document.querySelector("#best").textContent=p.best;document.querySelector("#reason").textContent=p.reason;document.querySelector("#link").href=p.url;document.querySelector("#axes").innerHTML=p.axes.map((v,i)=>"<div class=axis><b>"+v+"</b>"+labels[i]+"</div>").join("");document.querySelector("#buttons").innerHTML=projects.map((p,i)=>"<button class="+(i===selected?"active":"")+" onclick='selected="+i+";render()'>"+p.name+"</button>").join("");document.querySelector("#list").innerHTML=projects.map(p=>"<article><div><b>"+p.name+"</b><br><small>"+p.summary+"</small></div><b>"+p.score+"</b></article>").join("")}render();
</script></body></html>
