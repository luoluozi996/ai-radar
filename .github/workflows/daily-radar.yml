name: Generate Daily AI Radar

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: "Report date, for example 2026-07-16. Leave empty for today in Asia/Shanghai."
        required: false
        default: ""
  schedule:
    # Runs at 08:30 Asia/Shanghai every day.
    - cron: "30 0 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -n "${{ inputs.report_date }}" ]; then
            python scripts/generate_daily_radar.py --date "${{ inputs.report_date }}"
          else
            python scripts/generate_daily_radar.py
          fi

      - name: Commit generated report
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html ai-project-radar-*.html data/latest-summary.json
          git commit -m "publish: generate daily AI radar"
          git push

      - name: Send WeChat summary
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -z "$SERVERCHAN_SENDKEY" ]; then
            echo "SERVERCHAN_SENDKEY is not set; skip WeChat notification."
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          import re
          import urllib.parse
          import urllib.request
          from pathlib import Path

          def clean(value, limit=96):
              value = re.sub(r"\s+", " ", value or "").strip()
              if len(value) <= limit:
                  return value
              return value[: limit - 1].rstrip() + "…"

          def repo_short_name(title):
              return title.split("/")[-1].replace("-", " ").replace("_", " ").strip() or title

          def github_repo_name(url):
              match = re.match(r"https://github\.com/([^/]+/[^/#?]+)", url or "")
              return match.group(1) if match else ""

          def fetch_github_description(item):
              repo = github_repo_name(item.get("url", ""))
              if not repo:
                  return ""
              headers = {
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "ai-radar-wechat-summary/1.0",
              }
              token = os.environ.get("GITHUB_TOKEN")
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              request = urllib.request.Request(f"https://api.github.com/repos/{repo}", headers=headers)
              try:
                  with urllib.request.urlopen(request, timeout=12) as response:
                      data = json.loads(response.read().decode("utf-8"))
              except Exception as exc:  # noqa: BLE001 - notification should still be sent.
                  print(f"[warn] GitHub meta failed for {repo}: {exc}")
                  return ""
              return data.get("description") or ""

          def enrich(item):
              if item.get("source") == "GitHub":
                  item = dict(item)
                  item["project_description"] = fetch_github_description(item)
                  return item
              return item

          def github_theme(title, description):
              text = f"{title} {description}".lower()
              if any(word in text for word in ["trading", "market", "backtest", "finance", "crypto"]):
                  return "量化交易与自动化策略"
              if any(word in text for word in ["agent", "agents", "orchestration", "workflow", "multi-agent"]):
                  return "多智能体协作与动态工作流"
              if any(word in text for word in ["bird", "bat", "audio", "sound", "soundscape"]):
                  return "实时声音分析与垂直场景落地"
              if any(word in text for word in ["bi", "business intelligence", "analytics", "dashboard", "data"]):
                  return "数据分析与 BI 工作流"
              if any(word in text for word in ["code", "coding", "coder", "developer", "cli"]):
                  return "AI 编程与开发提效"
              if any(word in text for word in ["rag", "search", "knowledge", "retrieval"]):
                  return "知识检索与 RAG 应用"
              if any(word in text for word in ["model", "llm", "inference", "benchmark"]):
                  return "模型工程与 LLM 应用"
              if any(word in text for word in ["web", "app", "sdk", "framework", "ui"]):
                  return "AI 应用开发框架"
              return "具体工具场景里的 AI 落地"

          def github_highlight(title, description):
              name = repo_short_name(title)
              text = f"{title} {description}".lower()
              if any(word in text for word in ["trading", "market", "backtest", "finance", "crypto"]):
                  return f"{name} 聚焦量化/自动交易，把策略开发、回测和执行链路做成工程化工具。"
              if any(word in text for word in ["orchestration", "multi-agent"]):
                  return f"{name} 关注多智能体编排，让多个 agent 能按动态工作流协同完成任务。"
              if any(word in text for word in ["agent", "agents", "workflow"]):
                  return f"{name} 关注 agent 工作流，把任务拆解、工具调用和执行过程组织成可复用流程。"
              if any(word in text for word in ["flower", "federated", "flwr"]):
                  return f"{name} 聚焦联邦学习/分布式 AI，让模型训练能跨设备或跨组织协作。"
              if any(word in text for word in ["bird", "bat", "audio", "sound", "soundscape"]):
                  return f"{name} 把 AI 用在实时声音分析上，面向鸟类、蝙蝠等生态监测场景。"
              if any(word in text for word in ["business intelligence", "analytics", "dashboard", "data", "bi"]):
                  return f"{name} 把 AI 接到数据分析场景，帮助团队更快完成查询、看板和业务洞察。"
              if any(word in text for word in ["code", "coding", "coder", "developer", "cli"]):
                  return f"{name} 面向 AI 编程/开发提效，重点是把能力接进真实开发流程。"
              if any(word in text for word in ["rag", "search", "knowledge", "retrieval"]):
                  return f"{name} 聚焦知识检索/RAG，把搜索、资料组织和生成回答连接起来。"
              if any(word in text for word in ["model", "llm", "inference", "benchmark"]):
                  return f"{name} 面向模型工程或 LLM 应用，提供可试用、可评估或可部署的入口。"
              if any(word in text for word in ["web", "app", "sdk", "framework", "ui"]):
                  return f"{name} 面向 AI 应用开发，降低从原型到可用产品的搭建成本。"
              return f"{name} 是一个具体工具型项目，值得看它把 AI 能力落到了哪个实际使用场景。"

          def item_highlight(item):
              source = item.get("source", "")
              title = item.get("title", "Untitled")
              description = item.get("project_description") or item.get("summary") or ""

              if source == "GitHub":
                  return github_highlight(title, description)
              if source == "Hacker News":
                  return "开发者社区正在讨论这个话题，价值在真实反馈、质疑和反例。"
              if source == "Hugging Face":
                  return "这是近期升温的模型或 Demo，适合直接看示例、试效果和判断复用价值。"
              if source == "RSS":
                  return clean(description, 58) or "来自官方或高质量博客的更新，适合判断产品和研究方向变化。"
              return clean(description, 58) or "值得进一步点开核验的 AI 内容信号。"

          def mainline(items):
              if not items:
                  return "今日暂未抓到足够强的 AI 内容信号，完整日报保留候选内容供复核。"
              top = items[0]
              title = top.get("title", "今日 Top 1")
              source = top.get("source", "")
              description = top.get("project_description") or top.get("summary") or ""
              if source == "GitHub":
                  theme = github_theme(title, description)
                  return f"今日最强信号来自 {title}，指向{theme}。"
              return f"今日最强信号来自 {title}，建议优先看它背后的趋势变化。"

          sendkey = os.environ["SERVERCHAN_SENDKEY"]
          data = json.loads(Path("data/latest-summary.json").read_text(encoding="utf-8"))
          top_items = [enrich(item) for item in data.get("top_items", [])[:3]]

          lines = [
              "【今日主线】",
              mainline(top_items),
              "",
              "【今日值得看】",
          ]
          for idx, item in enumerate(top_items, 1):
              title = item.get("title", "Untitled")
              lines.extend([
                  f"{idx}. {title}",
                  f"   亮点：{item_highlight(item)}",
                  "",
              ])

          lines.extend([
              "【完整日报】",
              data["report_url"],
          ])

          payload = urllib.parse.urlencode({
              "title": data["title"],
              "desp": "\n".join(lines),
          }).encode("utf-8")
          request = urllib.request.Request(
              f"https://sctapi.ftqq.com/{sendkey}.send",
              data=payload,
              method="POST",
              headers={"Content-Type": "application/x-www-form-urlencoded"},
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              print(response.read().decode("utf-8", errors="replace"))
          PY
