name: Generate Daily AI Radar

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: "Report date, for example 2026-07-16. Leave empty for today in Asia/Shanghai."
        required: false
        default: ""
  schedule:
    # Runs at 08:30 Asia/Shanghai every day.
    - cron: "30 0 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -n "${{ inputs.report_date }}" ]; then
            python scripts/generate_daily_radar.py --date "${{ inputs.report_date }}"
          else
            python scripts/generate_daily_radar.py
          fi

      - name: Commit generated report
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html ai-project-radar-*.html data/latest-summary.json
          git commit -m "publish: generate daily AI radar"
          git push

      - name: Send WeChat summary
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        shell: bash
        run: |
          if [ -z "$SERVERCHAN_SENDKEY" ]; then
            echo "SERVERCHAN_SENDKEY is not set; skip WeChat notification."
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          def contains(text, words):
              return any(word in text for word in words)

          def item_reason(item):
              source = item.get("source", "")
              title = item.get("title", "")
              text = title.lower()

              if source == "GitHub":
                  if contains(text, ["code", "coding", "qwen-code", "coder", "dev", "cli"]):
                      return "AI 编程工具信号，重点看它是否能进入真实开发流程，而不是只停留在 demo。"
                  if contains(text, ["agent", "agents", "flow", "workflow", "deer"]):
                      return "agent 工作流信号，重点看任务拆解、执行链路和示例是否清楚。"
                  if contains(text, ["flower", "flwr", "federated"]):
                      return "分布式/联邦学习信号，重点看训练协作方式和工程落地难度。"
                  if contains(text, ["vercel", "sdk", "framework", "app"]):
                      return "AI 应用开发基础设施信号，重点看生态接入、模板和上手成本。"
                  if contains(text, ["model", "llm", "rag", "inference"]):
                      return "模型工程信号，重点看可复现示例、部署路径和使用限制。"
                  return "近期活跃开源项目，重点看 README、安装路径和最近提交质量。"

              if source == "Hacker News":
                  return "开发者社区讨论信号，重点看高赞评论里的真实反馈和反对意见。"
              if source == "Hugging Face":
                  return "模型或 Demo 热度信号，重点看示例、license、可试用性和任务适配度。"
              if source == "RSS":
                  return "文章/官方发布信号，重点看它透露的产品、研究或生态方向变化。"
              return "值得进一步点开核验的 AI 内容信号。"

          def item_action(item):
              source = item.get("source", "")
              title = item.get("title", "")
              text = title.lower()

              if source == "GitHub":
                  if contains(text, ["code", "coding", "qwen-code", "coder", "dev", "cli"]):
                      return "先看 Quick Start 和 CLI/API 示例，判断今天能不能直接试跑。"
                  if contains(text, ["agent", "agents", "flow", "workflow", "deer"]):
                      return "先看示例任务和执行结果，再判断能否替代一段现有手工流程。"
                  if contains(text, ["flower", "flwr", "federated"]):
                      return "先看适用场景和样例训练流程，判断是否值得收藏跟进。"
                  return "先看 README 的使用场景，再看最近提交，决定试用还是观察。"

              if source == "Hacker News":
                  return "先读评论区前几条高质量观点，再决定是否进入原文。"
              if source == "Hugging Face":
                  return "先看 demo、license 和示例输入输出，确认是否能复用。"
              if source == "RSS":
                  return "先扫摘要和发布时间，再判断是否需要阅读全文。"
              return "先看完整日报里的雷达图和链接，再决定下一步。"

          sendkey = os.environ["SERVERCHAN_SENDKEY"]
          data = json.loads(Path("data/latest-summary.json").read_text(encoding="utf-8"))
          top_items = data.get("top_items", [])[:3]

          lines = [
              "【今日主线】",
              data.get("headline", "今日 AI 内容雷达已更新。"),
              "",
              "【今日值得看】",
          ]
          for idx, item in enumerate(top_items, 1):
              source = item.get("source", "Unknown")
              score = item.get("score", "-")
              title = item.get("title", "Untitled")
              lines.extend([
                  f"{idx}. {title}",
                  f"   来源：{source}｜评分：{score}",
                  f"   看点：{item_reason(item)}",
                  f"   建议：{item_action(item)}",
                  "",
              ])

          lines.extend([
              "【怎么读】",
              "微信里先看方向和取舍；具体链接、项目小雷达和排序理由放在完整日报里。",
              "",
              "【完整日报】",
              data["report_url"],
          ])

          payload = urllib.parse.urlencode({
              "title": data["title"],
              "desp": "\n".join(lines),
          }).encode("utf-8")
          request = urllib.request.Request(
              f"https://sctapi.ftqq.com/{sendkey}.send",
              data=payload,
              method="POST",
              headers={"Content-Type": "application/x-www-form-urlencoded"},
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              print(response.read().decode("utf-8", errors="replace"))
          PY
