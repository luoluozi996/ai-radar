name: Generate Daily AI Radar

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: "Report date, for example 2026-07-16. Leave empty for today in Asia/Shanghai."
        required: false
        default: ""
  schedule:
    # Runs at 08:30 Asia/Shanghai every day.
    - cron: "30 0 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -n "${{ inputs.report_date }}" ]; then
            python scripts/generate_daily_radar.py --date "${{ inputs.report_date }}"
          else
            python scripts/generate_daily_radar.py
          fi

      - name: Preserve project homepage
        shell: bash
        run: |
          if [ -n "${{ inputs.report_date }}" ]; then
            report_date="${{ inputs.report_date }}"
          else
            report_date="$(TZ=Asia/Shanghai date +%F)"
          fi
          mkdir -p daily
          if ! git diff --quiet -- index.html; then
            cp index.html "daily/${report_date}.html"
            python - <<PY
          from pathlib import Path
          path = Path("daily/${report_date}.html")
          text = path.read_text(encoding="utf-8")
          text = text.replace('url=./ai-project-radar-', 'url=../ai-project-radar-')
          text = text.replace('href="./ai-project-radar-', 'href="../ai-project-radar-')
          path.write_text(text, encoding="utf-8")
          PY
            git checkout -- index.html
          fi

      - name: Commit generated report
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ai-project-radar-*.html daily/*.html data/latest-summary.json
          git commit -m "publish: generate daily AI radar"
          git push

      - name: Send WeChat summary
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          if [ -z "$SERVERCHAN_SENDKEY" ]; then
            echo "SERVERCHAN_SENDKEY is not set; skip WeChat notification."
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          import re
          import urllib.parse
          import urllib.request
          from pathlib import Path

          def clean(value, limit=120):
              value = re.sub(r"\s+", " ", value or "").strip()
              if len(value) <= limit:
                  return value
              return value[: limit - 1].rstrip() + "…"

          def repo_name_from_url(url):
              match = re.match(r"https://github\.com/([^/]+/[^/#?]+)", url or "")
              return match.group(1) if match else ""

          def repo_short_name(title):
              return title.split("/")[-1].replace("-", " ").replace("_", " ").strip() or title

          def request_json(url, payload=None, headers=None, timeout=20):
              data = json.dumps(payload).encode("utf-8") if payload is not None else None
              request = urllib.request.Request(url, data=data, headers=headers or {})
              with urllib.request.urlopen(request, timeout=timeout) as response:
                  return json.loads(response.read().decode("utf-8"))

          def fetch_github_meta(item):
              repo = repo_name_from_url(item.get("url", ""))
              if not repo:
                  return {}
              headers = {
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "ai-radar-wechat-summary/1.0",
              }
              token = os.environ.get("GITHUB_TOKEN")
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              try:
                  data = request_json(f"https://api.github.com/repos/{repo}", headers=headers, timeout=12)
              except Exception as exc:
                  print(f"[warn] GitHub meta failed for {repo}: {exc}")
                  return {}
              return {
                  "description": data.get("description") or "",
                  "homepage": data.get("homepage") or "",
                  "topics": data.get("topics") or [],
              }

          def enrich(item):
              item = dict(item)
              if item.get("source") == "GitHub":
                  item["github_meta"] = fetch_github_meta(item)
              return item

          def provider_config():
              api_key = os.environ.get("AI_API_KEY") or os.environ.get("OPENAI_API_KEY")
              if not api_key:
                  return None
              base_url = os.environ.get("AI_BASE_URL") or "https://api.openai.com/v1"
              base_url = base_url.rstrip("/")
              model = os.environ.get("AI_MODEL") or "gpt-4.1-mini"
              return api_key, base_url, model

          def extract_chat_text(data):
              choices = data.get("choices") or []
              if choices:
                  message = choices[0].get("message") or {}
                  content = message.get("content")
                  if isinstance(content, str):
                      return content.strip()
                  if isinstance(content, list):
                      return "".join(part.get("text", "") for part in content if isinstance(part, dict)).strip()
              return ""

          def ai_highlight(item):
              config = provider_config()
              if not config:
                  return ""
              api_key, base_url, model = config
              meta = item.get("github_meta") or {}
              title = item.get("title", "")
              source = item.get("source", "")
              description = meta.get("description") or item.get("summary") or ""
              topics = ", ".join(meta.get("topics", [])[:5])
              prompt = (
                  "请基于下面这个 AI 内容条目的真实信息，写一句中文亮点摘要。"
                  "要求：只输出一句话；25到55个中文字符；不要写‘亮点是’；不要泛泛而谈；"
                  "必须体现这个项目/内容具体在做什么；不要编造。\n\n"
                  f"标题：{title}\n来源：{source}\n简介：{description}\n标签：{topics}\n"
              )
              payload = {
                  "model": model,
                  "messages": [
                      {"role": "system", "content": "你是一个给 AI 日报写项目亮点摘要的中文编辑。"},
                      {"role": "user", "content": prompt},
                  ],
                  "temperature": 0.2,
                  "max_tokens": 120,
              }
              headers = {
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
              }
              try:
                  data = request_json(f"{base_url}/chat/completions", payload=payload, headers=headers, timeout=25)
                  return clean(extract_chat_text(data), 80)
              except Exception as exc:
                  print(f"[warn] AI highlight failed for {title}: {exc}")
                  return ""

          def fallback_highlight(item):
              source = item.get("source", "")
              title = item.get("title", "Untitled")
              meta = item.get("github_meta") or {}
              description = meta.get("description") or item.get("summary") or ""
              if description:
                  return clean(f"{repo_short_name(title)}：{description}", 86)
              if source == "GitHub":
                  return f"{repo_short_name(title)} 是今日进入榜单的开源项目，建议点开日报查看具体用途。"
              return clean(item.get("summary", "值得进一步查看的 AI 内容信号。"), 86)

          def item_highlight(item):
              return ai_highlight(item) or fallback_highlight(item)

          def mainline(items):
              if not items:
                  return "今日暂未抓到足够强的 AI 内容信号，完整日报保留候选内容供复核。"
              top = items[0]
              return f"今日最强信号来自 {top.get('title', 'Top 1')}，优先看它解决的具体场景。"

          sendkey = os.environ["SERVERCHAN_SENDKEY"]
          data = json.loads(Path("data/latest-summary.json").read_text(encoding="utf-8"))
          top_items = [enrich(item) for item in data.get("top_items", [])[:3]]

          lines = [
              "【今日主线】",
              mainline(top_items),
              "",
              "【今日值得看】",
          ]
          for idx, item in enumerate(top_items, 1):
              title = item.get("title", "Untitled")
              lines.extend([
                  f"{idx}. {title}",
                  f"   亮点：{item_highlight(item)}",
                  "",
              ])

          lines.extend([
              "【完整日报】",
              data["report_url"],
          ])

          payload = urllib.parse.urlencode({
              "title": data["title"],
              "desp": "\n".join(lines),
          }).encode("utf-8")
          request = urllib.request.Request(
              f"https://sctapi.ftqq.com/{sendkey}.send",
              data=payload,
              method="POST",
              headers={"Content-Type": "application/x-www-form-urlencoded"},
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              print(response.read().decode("utf-8", errors="replace"))
          PY
