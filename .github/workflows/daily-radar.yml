name: Generate Daily AI Radar

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: "Report date, for example 2026-07-16. Leave empty for today in Asia/Shanghai."
        required: false
        default: ""
  schedule:
    # Runs at 08:30 Asia/Shanghai every day.
    - cron: "30 0 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -n "${{ inputs.report_date }}" ]; then
            python scripts/generate_daily_radar.py --date "${{ inputs.report_date }}"
          else
            python scripts/generate_daily_radar.py
          fi

      - name: Commit generated report
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html ai-project-radar-*.html data/latest-summary.json
          git commit -m "publish: generate daily AI radar"
          git push

      - name: Send WeChat summary
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -z "$SERVERCHAN_SENDKEY" ]; then
            echo "SERVERCHAN_SENDKEY is not set; skip WeChat notification."
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          import re
          import urllib.parse
          import urllib.request
          from pathlib import Path

          def clean(value, limit=86):
              value = re.sub(r"\s+", " ", value or "").strip()
              if len(value) <= limit:
                  return value
              return value[: limit - 1].rstrip() + "…"

          def github_repo_name(url):
              match = re.match(r"https://github\.com/([^/]+/[^/#?]+)", url or "")
              return match.group(1) if match else ""

          def fetch_github_meta(item):
              repo = github_repo_name(item.get("url", ""))
              if not repo:
                  return {}
              headers = {
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "ai-radar-wechat-summary/1.0",
              }
              token = os.environ.get("GITHUB_TOKEN")
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              request = urllib.request.Request(f"https://api.github.com/repos/{repo}", headers=headers)
              try:
                  with urllib.request.urlopen(request, timeout=12) as response:
                      data = json.loads(response.read().decode("utf-8"))
              except Exception as exc:  # noqa: BLE001 - notification should still be sent.
                  print(f"[warn] GitHub meta failed for {repo}: {exc}")
                  return {}
              return {
                  "description": data.get("description") or "",
                  "language": data.get("language") or "",
                  "stars": data.get("stargazers_count") or 0,
                  "topics": data.get("topics") or [],
              }

          def enrich(item):
              if item.get("source") == "GitHub":
                  item = dict(item)
                  item["meta"] = fetch_github_meta(item)
                  return item
              return item

          def item_insight(item):
              source = item.get("source", "")
              title = item.get("title", "Untitled")
              meta = item.get("meta") or {}
              description = clean(item.get("summary") or meta.get("description"), 74)
              language = meta.get("language")
              topics = [topic for topic in meta.get("topics", [])[:3] if topic]

              if source == "GitHub":
                  if description:
                      parts = [f"它主打：{description}"]
                      if language:
                          parts.append(f"主要语言：{language}")
                      if topics:
                          parts.append(f"标签：{', '.join(topics)}")
                      return "；".join(parts) + "。"
                  return f"{title} 是今天进入 Top 3 的活跃开源项目，适合先判断它解决的是不是你的真实需求。"

              if source == "Hacker News":
                  return "这是开发者社区讨论信号，价值在评论里的真实使用反馈、质疑和反例。"
              if source == "Hugging Face":
                  return "这是模型或 Demo 热度信号，价值在可试用性、license 和示例输入输出。"
              if source == "RSS":
                  return description or "这是文章/官方发布信号，价值在判断产品、研究或生态方向变化。"
              return description or "这是值得进一步点开核验的 AI 内容信号。"

          def item_action(item):
              source = item.get("source", "")
              title = item.get("title", "").lower()
              description = (item.get("summary") or (item.get("meta") or {}).get("description") or "").lower()
              text = f"{title} {description}"

              if source == "GitHub":
                  if any(word in text for word in ["agent", "workflow", "flow", "automation"]):
                      return "先看示例任务和执行结果，再判断能不能替代一段现有手工流程。"
                  if any(word in text for word in ["code", "coding", "coder", "cli", "developer"]):
                      return "先看 Quick Start 和 CLI/API 示例，判断今天能不能直接试跑。"
                  if any(word in text for word in ["trading", "finance", "bot"]):
                      return "先核对风险、回测方式和使用限制，不要只看项目热度。"
                  return "先看 README 的使用场景和安装路径，再看最近提交，决定试用还是收藏。"

              if source == "Hacker News":
                  return "先读高赞评论和反对意见，再决定是否进入原文。"
              if source == "Hugging Face":
                  return "先看 demo、license 和示例输入输出，确认是否能复用。"
              if source == "RSS":
                  return "先扫摘要和发布时间，再判断是否需要阅读全文。"
              return "先看完整日报里的雷达图和链接，再决定下一步。"

          sendkey = os.environ["SERVERCHAN_SENDKEY"]
          data = json.loads(Path("data/latest-summary.json").read_text(encoding="utf-8"))
          top_items = [enrich(item) for item in data.get("top_items", [])[:3]]

          lines = [
              "【今日主线】",
              data.get("headline", "今日 AI 内容雷达已更新。"),
              "",
              "【今日值得看】",
          ]
          for idx, item in enumerate(top_items, 1):
              source = item.get("source", "Unknown")
              score = item.get("score", "-")
              title = item.get("title", "Untitled")
              lines.extend([
                  f"{idx}. {title}",
                  f"   来源：{source}｜评分：{score}",
                  f"   看点：{item_insight(item)}",
                  f"   建议：{item_action(item)}",
                  "",
              ])

          lines.extend([
              "【怎么读】",
              "微信里先看方向和取舍；具体链接、项目小雷达和排序理由放在完整日报里。",
              "",
              "【完整日报】",
              data["report_url"],
          ])

          payload = urllib.parse.urlencode({
              "title": data["title"],
              "desp": "\n".join(lines),
          }).encode("utf-8")
          request = urllib.request.Request(
              f"https://sctapi.ftqq.com/{sendkey}.send",
              data=payload,
              method="POST",
              headers={"Content-Type": "application/x-www-form-urlencoded"},
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              print(response.read().decode("utf-8", errors="replace"))
          PY
